apiVersion: apps/v1
kind: Deployment
metadata:
  name: project-orbit-app
  labels:
    app: project-orbit-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: project-orbit-app
  template:
    metadata:
      labels:
        app: project-orbit-app
    spec:
      containers:
        - name: project-orbit-app
          image: project-orbit-app:latest # This will be replaced by the CI/CD pipeline
          ports:
            - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: project-orbit-app
spec:
  selector:
    app: project-orbit-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
  type: LoadBalancer
